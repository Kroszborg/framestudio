  <!-- Play button triangle -->
  <path d="M390 370 L700 512 L390 654 Z" fill="white"/>

  <!-- Timeline bar at bottom of screen -->
  <rect x="148" y="700" width="748" height="18" rx="9" fill="white" opacity="0.15"/>
  <rect x="148" y="700" width="340" height="18" rx="9" fill="white" opacity="0.65"/>
  <!-- Playhead circle -->
